<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚔️ Arkanor Krónikái</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a843;--gold2:#f0c860;--gold3:#ffe082;
  --dark:#0a0705;--dark2:#130f09;--dark3:#1c1510;
  --border:#6b4a18;--border2:#9b6f28;--border3:#c49040;
  --red:#c0392b;--red2:#e74c3c;--green:#27ae60;--green2:#2ecc71;
  --blue:#2980b9;--blue2:#3498db;
  --text:#e8d5a8;--text2:#f5e6c0;--text3:#c4a870;
  --panel:rgba(10,7,5,0.92);
  --panelborder:linear-gradient(135deg,#9b6f28,#6b4a18,#9b6f28,#6b4a18);
}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0705;color:var(--text);font-family:'EB Garamond',Georgia,serif;font-size:14px}

body{
  background:
    radial-gradient(ellipse at 20% 50%,rgba(139,90,20,.08),transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(80,40,10,.1),transparent 50%),
    linear-gradient(180deg,#0d0a06,#080604,#050402);
}

/* ===== SCROLLBARS ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#080604}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ===== SHELL ===== */
#shell{
  display:flex;flex-direction:column;
  height:100vh;max-width:1400px;margin:0 auto;
  padding:6px;gap:5px;
}

/* ===== HEADER ===== */
.top{
  flex-shrink:0;
  position:relative;
  background:linear-gradient(180deg,#1e1408,#0d0904);
  border:1px solid var(--border2);
  padding:8px 20px;
  text-align:center;
  overflow:hidden;
}
.top::before,.top::after{
  content:"⚔";position:absolute;top:50%;transform:translateY(-50%);
  font-size:20px;color:var(--border3);opacity:.6;
}
.top::before{left:16px}.top::after{right:16px}
.top-title{
  font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;
  color:var(--gold2);letter-spacing:4px;text-transform:uppercase;
  text-shadow:0 0 30px rgba(212,168,67,.4),0 2px 4px #000;
}
.top-ornament{
  font-size:10px;color:var(--border3);letter-spacing:6px;
  display:block;margin-top:1px;opacity:.7;
}

/* ===== NAV ===== */
.nav{
  flex-shrink:0;
  display:flex;flex-wrap:wrap;gap:3px;
  background:var(--dark2);
  border:1px solid var(--border);
  padding:4px;
}

/* ===== MAIN 3-COL ===== */
.main-area{
  flex:1;display:grid;
  grid-template-columns:240px 1fr 260px;
  gap:5px;min-height:0;
}

/* ===== PANELS ===== */
.panel{
  background:var(--panel);
  border:1px solid var(--border2);
  padding:0;overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}
.panel::before{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(155,111,40,.06) 0%,transparent 50%,rgba(155,111,40,.04) 100%);
  pointer-events:none;z-index:0;
}
.panel-inner{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;position:relative;z-index:1}

.panel-header{
  padding:8px 12px;
  background:linear-gradient(180deg,rgba(155,111,40,.15),rgba(155,111,40,.05));
  border-bottom:1px solid var(--border);
  font-family:'Cinzel',serif;font-size:13px;font-weight:600;
  color:var(--gold2);letter-spacing:1px;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.panel-header .ph-icon{font-size:16px;opacity:.8}
.panel-header .ph-actions{margin-left:auto}

/* ===== CORNER ORNAMENTS ===== */
.panel::after{
  content:"";position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:
    linear-gradient(135deg,rgba(196,144,64,.12) 0px,transparent 30px),
    linear-gradient(225deg,rgba(196,144,64,.12) 0px,transparent 30px),
    linear-gradient(315deg,rgba(196,144,64,.12) 0px,transparent 30px),
    linear-gradient(45deg,rgba(196,144,64,.12) 0px,transparent 30px);
  pointer-events:none;z-index:0;
}

/* ===== BUTTONS ===== */
button{
  font-family:'Cinzel',serif;font-size:11px;font-weight:600;
  background:linear-gradient(180deg,rgba(107,74,24,.9),rgba(60,35,8,.95));
  border:1px solid var(--border2);color:var(--gold);
  padding:5px 10px;border-radius:3px;cursor:pointer;
  transition:all .15s;letter-spacing:.5px;
  position:relative;overflow:hidden;
}
button::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,224,130,.3),transparent);
}
button:hover{
  background:linear-gradient(180deg,rgba(155,111,40,.9),rgba(90,55,12,.95));
  border-color:var(--gold);color:var(--gold2);
  box-shadow:0 0 12px rgba(212,168,67,.2);transform:translateY(-1px);
}
button:active{transform:translateY(0);filter:brightness(.9)}

/* big action button */
button.btn-action{
  font-size:13px;padding:9px 14px;
  background:linear-gradient(180deg,rgba(120,80,20,.95),rgba(70,40,8,.98));
  border-color:var(--border3);
  box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,220,100,.1);
}
button.btn-action:hover{box-shadow:0 0 20px rgba(212,168,67,.3),0 2px 8px rgba(0,0,0,.5)}

button.btn-skill{
  font-size:11px;padding:7px 10px;
  background:linear-gradient(180deg,rgba(40,60,100,.9),rgba(20,30,60,.95));
  border-color:#3a5a9a;color:#7ab0ff;
}
button.btn-skill:hover{border-color:#5a80cc;color:#acd0ff;box-shadow:0 0 12px rgba(90,130,220,.25)}

button.btn-danger{
  background:linear-gradient(180deg,rgba(120,30,20,.9),rgba(70,15,10,.95));
  border-color:#8a3a30;color:#ff8070;
}
button.btn-danger:hover{border-color:#cc5a50;box-shadow:0 0 12px rgba(200,60,50,.25)}

/* ===== STAT ROWS ===== */
.srow{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid rgba(107,74,24,.2)}
.srow:last-child{border-bottom:none}
.srow .lbl{color:var(--text3);font-size:11px}
.srow .val{color:var(--text2);font-weight:500}

/* ===== BARS ===== */
.barlabel{display:flex;align-items:center;gap:6px;margin:3px 0}
.barlabel .bl-icon{font-size:13px;width:18px;text-align:center}
.barlabel .bl-name{font-size:11px;color:var(--text3);width:38px;flex-shrink:0;font-family:'Cinzel',serif}
.bar{flex:1;background:rgba(0,0,0,.6);border:1px solid var(--border);height:18px;border-radius:2px;overflow:hidden;position:relative}
.fill{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Cinzel',serif;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);transition:width .4s ease;min-width:30px}
.fill.hp{background:linear-gradient(90deg,#7a0f0f,#c0392b,#e74c3c)}
.fill.en{background:linear-gradient(90deg,#0d5c2a,#1a8a42,#27ae60)}
.fill.xp{background:linear-gradient(90deg,#1a3a7a,#2563b0,#3b82f6)}

/* ===== STAT GRID ===== */
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px}
.statbox{
  background:rgba(0,0,0,.5);border:1px solid var(--border);
  padding:6px 3px;text-align:center;border-radius:2px;
  font-family:'Cinzel',serif;
}
.statbox .sb-icon{font-size:16px;display:block;margin-bottom:2px}
.statbox .sb-val{font-size:13px;color:var(--gold2);font-weight:700}
.statbox .sb-lbl{font-size:9px;color:var(--text3);letter-spacing:.5px}

/* ===== PORTRAIT ===== */
.portrait{
  width:100%;aspect-ratio:1;
  background:linear-gradient(135deg,#1a1006,#0a0602);
  border:1px solid var(--border2);
  border-radius:3px;overflow:hidden;margin-bottom:8px;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.portrait::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 80%,rgba(196,144,64,.1),transparent 60%);
}
.portrait-emoji{font-size:72px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.8))}
.portrait img{width:100%;height:100%;object-fit:cover}

/* player name badge */
.player-badge{
  text-align:center;margin-bottom:8px;padding:6px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:3px;
}
.player-badge .pb-name{
  font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;
  color:var(--gold2);text-shadow:0 0 12px rgba(212,168,67,.3);
}
.player-badge .pb-sub{font-size:11px;color:var(--text3);letter-spacing:1px;margin-top:2px}

/* resources */
.resources{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:6px 0;
}
.res{
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:2px;
  padding:4px 6px;display:flex;align-items:center;gap:5px;
  font-family:'Cinzel',serif;font-size:11px;
}
.res .r-icon{font-size:14px}
.res .r-val{color:var(--gold2);font-weight:700}
.res .r-lbl{color:var(--text3);font-size:10px}

/* equip list */
.equip-list{font-size:11px;line-height:2;color:var(--text3)}
.equip-list span{color:var(--text2);margin-left:4px}

/* ===== EQUIP BOX ===== */
.equipbox{
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:3px;
  padding:8px 10px;margin-bottom:6px;font-size:12px;line-height:1.7;
}
.equipbox b{color:var(--gold);font-family:'Cinzel',serif;font-size:12px}
.equipbox .eb-desc{color:var(--text3);font-size:11px;font-style:italic}
.equipbox .eb-price{color:var(--gold2);font-weight:700}

/* section header inside panel */
.sec-header{
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  color:var(--gold);letter-spacing:1px;
  border-bottom:1px solid var(--border);padding-bottom:4px;margin:10px 0 6px;
  display:flex;align-items:center;gap:6px;
}
.sec-header:first-child{margin-top:0}
.sec-header::before{content:"◆";font-size:8px;opacity:.6}

/* ===== LOG ===== */
.log{
  flex:1;overflow-y:auto;
  padding:8px;font-size:12px;line-height:1.6;
  background:rgba(0,0,0,.3);
}
.log-entry{
  display:flex;align-items:flex-start;gap:6px;
  padding:3px 0;border-bottom:1px solid rgba(107,74,24,.15);
}
.log-entry:last-child{border-bottom:none}
.log-icon{font-size:11px;flex-shrink:0;width:16px;text-align:center;margin-top:1px}
.log-text{flex:1;color:var(--text);line-height:1.4}
.log-time{color:var(--text3);font-size:10px;flex-shrink:0;font-family:'Cinzel',serif;margin-top:1px}
.log-entry.l-kill .log-text{color:#ff8080}
.log-entry.l-loot .log-text{color:#80d480}
.log-entry.l-gold .log-text{color:var(--gold2)}
.log-entry.l-hit .log-text{color:#90b8ff}
.log-entry.l-dmg .log-text{color:#ffb080}
.log-entry.l-sys .log-text{color:var(--text3)}

/* ===== INV STRIP ===== */
.inv-strip{
  flex-shrink:0;
  background:var(--panel);border:1px solid var(--border2);
  padding:5px 8px;
}
.inv-strip-header{
  display:flex;align-items:center;gap:8px;margin-bottom:4px;
  font-family:'Cinzel',serif;font-size:11px;color:var(--gold);
}
.inv{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px}
.slot{
  flex-shrink:0;width:70px;height:70px;
  background:linear-gradient(135deg,rgba(20,15,5,.9),rgba(8,6,2,.95));
  border:1px solid var(--border);border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;cursor:pointer;padding:3px;transition:.15s;
  position:relative;overflow:hidden;
}
.slot::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,144,64,.2),transparent);
}
.slot:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(212,168,67,.2)}
.slot-emoji{font-size:24px;line-height:1;margin-bottom:2px}
.slot b{color:var(--text2);font-size:9px;font-family:'Cinzel',serif;line-height:1.2;display:block}
.slot .small{color:var(--text3);font-size:9px;font-style:italic}
.slot.rare{border-color:#4ea0ff;box-shadow:0 0 8px rgba(78,160,255,.2)}
.slot.epic{border-color:#b46cff;box-shadow:0 0 8px rgba(180,108,255,.2)}
.slot.legendary{border-color:#ff9d2e;box-shadow:0 0 12px rgba(255,157,46,.35)}

/* ===== BATTLE ===== */
.battle-wrapper{display:flex;flex-direction:column;height:100%;gap:6px}
.battle-header{text-align:center;flex-shrink:0}
.battle-title{
  font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;
  color:var(--gold2);letter-spacing:3px;
  text-shadow:0 0 20px rgba(212,168,67,.3);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.battle-title .bt-swords{font-size:18px;opacity:.7;animation:swordPulse 2s ease-in-out infinite}
@keyframes swordPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

.enemy-name-big{
  font-family:'Cinzel',serif;font-size:22px;font-weight:700;
  color:#ff9080;text-shadow:0 0 20px rgba(200,80,60,.4);
  margin:4px 0 2px;
}
.enemy-level{font-size:12px;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:1px}

/* fight scene */
.fight-scene{
  flex:1;
  position:relative;overflow:hidden;border-radius:6px;
  border:1px solid var(--border2);
  background:
    linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1400") center/cover no-repeat;
  display:grid;grid-template-columns:1fr 1fr;
  min-height:180px;
}
.fighter-side{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:8px;position:relative;
}
.fighter-sprite{
  font-size:90px;line-height:1;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.9));
  margin-bottom:4px;
}
.fighter-sprite.hero{transform:scaleX(1);animation:heroIdle 3s ease-in-out infinite}
.fighter-sprite.enemy-side{animation:enemyIdle 2.5s ease-in-out infinite}
@keyframes heroIdle{0%,100%{transform:scaleX(1) translateY(0)}50%{transform:scaleX(1) translateY(-3px)}}
@keyframes enemyIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.fighter-sprite img{max-height:160px;max-width:100%;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.9))}

.combat-card{
  background:rgba(5,3,2,.85);
  border:1px solid var(--border2);border-radius:4px;
  padding:6px 8px;width:100%;
  backdrop-filter:blur(4px);
}
.combat-card b{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);display:block;margin-bottom:4px}
.combat-card.enemy-card b{color:#ff8080}

/* damage number */
.dmg-pop{
  position:absolute;
  font-family:'Cinzel Decorative',serif;font-weight:900;
  pointer-events:none;z-index:100;
  animation:dmgAnim .9s ease-out forwards;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
}
.dmg-pop.enemy-dmg{color:#ff3333;font-size:42px;top:40%;right:5%}
.dmg-pop.hero-dmg{color:#ff8844;font-size:32px;top:40%;left:5%}
.dmg-pop.crit{color:#ffd700;font-size:52px}
.dmg-pop.heal-pop{color:#44ff88;font-size:36px;top:50%;left:50%}
.dmg-pop .crit-text{display:block;font-size:14px;text-align:center;color:#ffcc00;letter-spacing:2px}
@keyframes dmgAnim{
  0%{opacity:1;transform:translateY(0) scale(1)}
  20%{transform:translateY(-20px) scale(1.15)}
  100%{opacity:0;transform:translateY(-70px) scale(.8)}
}

/* battle actions */
.battle-actions{flex-shrink:0;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.skills-row{flex-shrink:0;display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.battle-text{
  flex-shrink:0;
  background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:4px;
  padding:8px 12px;font-size:13px;line-height:1.5;
  min-height:48px;display:flex;align-items:center;gap:8px;
}
.battle-text .bt-icon{font-size:18px;flex-shrink:0}

/* shake */
.shake{animation:shakeAnim .25s ease}
@keyframes shakeAnim{
  0%{transform:translateX(0)}20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}100%{transform:translateX(0)}
}

/* ===== CITY MAP ===== */
.cityMap{
  position:relative;width:100%;height:100%;
  min-height:380px;overflow:hidden;border-radius:4px;
  background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.65)),
    url("https://images.unsplash.com/photo-1518005020951-eccb494ad742?q=80&w=1200") center/cover no-repeat;
}
.cityMap::before{
  content:"";position:absolute;
  left:calc(50% - 28px);top:0;bottom:0;width:56px;
  background:repeating-linear-gradient(180deg,rgba(50,30,8,.8) 0,rgba(50,30,8,.8) 12px,rgba(25,12,3,.85) 12px,rgba(25,12,3,.85) 24px);
  border-left:2px solid rgba(100,65,18,.6);border-right:2px solid rgba(100,65,18,.6);z-index:1;
}
.cityMap::after{
  content:"";position:absolute;left:0;right:0;top:calc(50% - 22px);height:44px;
  background:repeating-linear-gradient(90deg,rgba(50,30,8,.8) 0,rgba(50,30,8,.8) 12px,rgba(25,12,3,.85) 12px,rgba(25,12,3,.85) 24px);
  border-top:2px solid rgba(100,65,18,.6);border-bottom:2px solid rgba(100,65,18,.6);z-index:1;
}
.cityTitle{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;
  color:var(--gold2);letter-spacing:3px;white-space:nowrap;z-index:10;
  padding:4px 16px;background:rgba(0,0,0,.65);
  border:1px solid rgba(155,111,40,.5);border-radius:2px;
  text-shadow:0 0 20px rgba(212,168,67,.4);pointer-events:none;
}
.cityCenter{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.cityCenter button{font-size:10px;padding:3px 10px;background:rgba(10,6,2,.88);border-color:var(--border2);white-space:nowrap}

/* buildings */
.building{position:absolute;width:88px;cursor:pointer;z-index:5;transition:.2s;text-align:center}
.b-house{position:relative;width:100%}
.b-roof{
  width:0;height:0;
  border-left:44px solid transparent;border-right:44px solid transparent;
  border-bottom:28px solid #4a2406;
  margin:0 auto;position:relative;
  filter:drop-shadow(0 -3px 8px rgba(0,0,0,.8));
}
.b-roof::after{
  content:"";position:absolute;top:4px;left:-36px;
  width:0;height:0;
  border-left:36px solid transparent;border-right:36px solid transparent;
  border-bottom:22px solid #6a3408;
}
.b-wall{
  background:linear-gradient(180deg,#2e1808,#180c04);
  border:2px solid var(--border2);border-top:none;
  padding:6px 4px 5px;position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.8),inset 0 0 12px rgba(0,0,0,.5);
}
.b-wall::before{
  content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:13px;height:16px;
  background:linear-gradient(#060401,#140a03);
  border:1px solid var(--border);border-bottom:none;border-radius:5px 5px 0 0;
}
.b-icon{font-size:20px;display:block;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,1));position:relative;z-index:2}
.b-name{display:block;font-family:'Cinzel',serif;font-size:9px;color:var(--gold2);margin-top:3px;letter-spacing:.5px;text-shadow:0 1px 6px #000;position:relative;z-index:2}
.b-torch{position:absolute;top:26px;font-size:12px;animation:flicker 1.4s ease-in-out infinite;z-index:3}
.b-torch.left{left:-3px}.b-torch.right{right:-3px}

function makePixelSprite(emoji,size=100){
  const c=document.createElement("canvas");c.width=size;c.height=size;
  const x=c.getContext("2d");
  const g=x.createRadialGradient(size/2,size*1.1,0,size/2,size/2,size*.7);
  g.addColorStop(0,"rgba(80,45,10,.5)");g.addColorStop(1,"rgba(0,0,0,0)");
  x.fillStyle=g;x.fillRect(0,0,size,size);
  x.font=`${size*.6}px serif`;x.textAlign="center";x.textBaseline="middle";
  x.shadowColor="rgba(0,0,0,.9)";x.shadowBlur=12;
  x.fillText(emoji,size/2,size/2+2);
  return c.toDataURL();
}

let minimap=[],playerPos={x:5,y:5};const MM=11;
function initMinimap(){minimap=[];for(let y=0;y<MM;y++){minimap.push([]);for(let x=0;x<MM;x++)minimap[y].push({visited:false,type:"empty",event:null})}playerPos={x:5,y:5};minimap[5][5].visited=true;minimap[5][5].type="start"}

function movePlayer(dx,dy){let nx=Math.max(0,Math.min(MM-1,playerPos.x+dx)),ny=Math.max(0,Math.min(MM-1,playerPos.y+dy));playerPos={x:nx,y:ny};if(!minimap[ny][nx].visited){minimap[ny][nx].visited=true;let r=Math.random();minimap[ny][nx].type=r<.35?"enemy":r<.55?"loot":r<.65?"hideout":"empty"}}
function renderMinimap(){
  let cx=playerPos.x,cy=playerPos.y;
  let h=`<div class="minimap-wrap"><div class="minimap-title">🗺️ Erdő Térkép — Mélység: ${forestDepth}</div><div class="minimap-grid" style="grid-template-columns:repeat(${MM},16px)">`;
  for(let y=0;y<MM;y++)for(let x=0;x<MM;x++){
    let c=minimap[y][x],dist=Math.abs(x-cx)+Math.abs(y-cy),isCur=x===cx&&y===cy;
    let cls="mm-cell",inn="";
    if(isCur){cls+=" current";inn="🧍"}
    else if(!c.visited||dist>4){cls+=" fog"}
    else if(c.type==="enemy"&&c.event!=="done"){cls+=" enemy-here";inn="⚔"}
    else if(c.type==="loot"&&c.event!=="done"){cls+=" loot-here";inn="✦"}
    else if(c.type==="hideout"&&c.event!=="done"){inn="🕯"}
    else if(c.type==="start"){inn="🏠"}
    else if(c.visited){cls+=" visited"}
    h+=`<div class="${cls}">${inn}</div>`;
  }
  return h+"</div></div>";
}

// ===== UTILS =====
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function needXp(){return player.level*100}
function bonus(k){return(player.weapon[k]||0)+(player.armor[k]||0)+(player.ring[k]||0)+(player.amulet[k]||0)}
function atkTotal(){return player.atk+(player.weapon.atk||0)+player.stats.str*2+bonus("str")}
function defTotal(){return player.def+(player.armor.def||0)+player.stats.vit*2+bonus("vit")}
function critTotal(){return Math.min(60,10+player.stats.luck*2+bonus("luck")*2)}
function dodgeTotal(){return Math.min(45,5+player.stats.dex*2+bonus("dex")*2)}
function normalize(){
  if(!player.stats)player.stats={str:1,vit:1,int:1,dex:1,luck:1};
  if(!player.stash)player.stash=[];
  if(!player.bagCap)player.bagCap=10;
  if(!player.stashCap)player.stashCap=30;
  if(!player.kills)player.kills={};
  if(!player.found)player.found={};
  if(!player.ring)player.ring={name:"Nincs gyűrű",type:"ring",classReq:"all",icon:"⭕",desc:"Üres"};
  if(!player.amulet)player.amulet={name:"Nincs amulett",type:"amulet",classReq:"all",icon:"📿",desc:"Üres"};
  if(!player.achievements)player.achievements=[];
  if(!player.crafted)player.crafted=0;
  if(!player.arenaWins)player.arenaWins=0;
  if(!player.bossKills)player.bossKills=0;
}
function bar(name,val,max,cls){
  let p=Math.max(0,Math.min(100,val/max*100));
  return`<div class="barlabel"><span class="bl-icon">${name}</span><div class="bar"><div class="fill ${cls}" style="width:${p}%">${val}/${max}</div></div></div>`;
}
function setMain(html,title="",icon="🏰"){
  document.getElementById("main").innerHTML=html;
  document.getElementById("main-header").innerHTML=`<span class="ph-icon">${icon}</span>${title}`;
}
function addItem(item){
  if(player.inv.length>=player.bagCap){log("Tele van a táskád: "+item.name,"sys","⚠️");return false}
  player.inv.push({...item});
  player.found[item.name]=(player.found[item.name]||0)+1;
  return true;
}
function useClick(n){if(player.clicks<n){log("Nincs elég clicked.","sys","⚠️");return false}player.clicks-=n;return true}
function hasItems(list){let t=[...player.inv];for(let n of list){let i=t.findIndex(x=>x.name===n);if(i<0)return false;t.splice(i,1)}return true}
function removeItems(list){for(let n of list){let i=player.inv.findIndex(x=>x.name===n);if(i>=0)player.inv.splice(i,1)}}

function portraitEmoji(){
  if(!player.class)return"🧙";

// ===== ACHIEVEMENTS =====
function achievementDone(a){
  let tk=Object.values(player.kills||{}).reduce((x,y)=>x+y,0);
  if(a.id==="firstKill")return tk>=1;
  if(a.id==="ratHunter")return(player.kills["Patkányember"]||0)>=3;
  if(a.id==="deep10")return player.maxForestDepth>=10;
  if(a.id==="firstBoss")return(player.bossKills||0)>=1;
  if(a.id==="firstCraft")return(player.crafted||0)>=1;
  if(a.id==="arena1")return(player.arenaWins||0)>=1;
  return false;
}
function achievementPage(){
  let h="";
  achievements.forEach(a=>{
    let done=achievementDone(a),claimed=player.achievements.includes(a.id);
    h+=`<div class="equipbox"><b>${done?"✅":"❌"} ${a.title}</b><br><span class="eb-desc">${a.desc}</span><br>+${a.reward.xp} XP, ${a.reward.silver} ezüst<br>
    ${done&&!claimed?`<button onclick="claimAchievement('${a.id}')">🏆 Jutalom</button>`:claimed?`<span class="green">✓ Átvéve</span>`:`<span class="small">Nincs kész</span>`}</div>`;
  });
  setMain(`<div style="padding:10px">${h}</div>`,"Eredmények","🏆");
}
function claimAchievement(id){
  let a=achievements.find(x=>x.id===id);
  if(!a||!achievementDone(a)){log("Még nincs kész.","sys","⚠️");return}
  if(player.achievements.includes(id)){log("Már átvetted.","sys","⚠️");return}
  player.achievements.push(id);player.xp+=a.reward.xp;player.silver+=a.reward.silver;
  log("Achievement: "+a.title,"gold","🏆");levelCheck();renderLeft();achievementPage();
}

function forestDir(dx,dy){
  if(!useClick(1))return;
  movePlayer(dx,dy);
  let cell=minimap[playerPos.y][playerPos.x];
  forestDepth++;if(forestDepth>player.maxForestDepth)player.maxForestDepth=forestDepth;
  if(cell.type==="enemy"&&cell.event!=="done"){cell.event="done";startBattleFromForest();return}
  if(cell.type==="loot"&&cell.event!=="done"){cell.event="done";let loot=forestLoot[r(0,forestLoot.length-1)];addItem(loot);log("Találtál: "+loot.name,"loot","✦");cell.type="empty"}
  if(cell.type==="hideout"&&cell.event!=="done"){cell.event="done";findHideout();return}
  forest(false);renderLeft();renderInv();
}
function forestSearch(){
  if(!useClick(1))return;
  let c=Math.random();
  if(c<.30){let loot=forestLoot[r(0,forestLoot.length-1)];addItem(loot);log("Találtál: "+loot.name,"loot","✦")}
  else if(c<.50){startBattleFromForest();return}
  else if(c<.62){findHideout();return}
  else log("Csak fákat és nyomokat látsz.","sys","·")
  forest(false);renderLeft();renderInv();
}
function findHideout(){currentScreen="hideout";renderLeft();hideout(false);log("Idegen rejtekhelyet találtál!","gold","🕯")}

}
function enterHideout(){
  if(!useClick(2))return;
  if(Math.random()<.35){
    enemy={name:"Rejtekhely őre",icon:"🧟",level:player.level+2,hp:90+player.level*20,maxHp:90+player.level*20,atk:12+player.level*3,xp:80+player.level*20,silver:120+player.level*40};
    currentScreen="battle";battleMsg="A rejtekhely őre rád támad!";renderBattle();log("A rejtekhely őre rád ront!","kill","💀");return;
  }
  let pool=[...forestLoot];
  if(Math.random()<.10)pool.push({name:"Rozsdás kulcs",type:"key",icon:"🗝️",desc:"Dungeon kulcs"});

function tavern(redraw=true){
  currentScreen="tavern";
  let h=`<div style="padding:10px">`;
  h+=`<div class="sec-header">Aktív küldetések</div>`;
  if(activeQuests.length===0)h+=`<p style="color:var(--text3);font-style:italic;margin-bottom:8px">Nincs aktív küldetésed.</p>`;
  activeQuests.forEach(qid=>{
    let q=quests.find(x=>x.id===qid),p=getQuestProgress(q);
    h+=`<div class="equipbox"><b>${q.title}</b><br><span class="eb-desc">${q.desc}</span><br><span class="gold">${p}/${q.need}</span><br><br><button onclick="turnInQuest('${q.id}')">📜 Leadás</button></div>`;
  });
  h+=`<div class="sec-header">Felvehető küldetések</div>`;
  quests.forEach(q=>{
    if(activeQuests.includes(q.id)||completedQuestIds.includes(q.id))return;
    h+=`<div class="equipbox"><b>${q.title}</b><br><span class="eb-desc">${q.desc}</span><br><span class="green">+${q.reward.xp} XP, ${q.reward.silver} ezüst</span><br><br><button onclick="takeQuest('${q.id}')">📜 Felveszem</button></div>`;
  });
  setMain(h+"</div>","Kocsma","🍺");if(redraw)render();
}
function takeQuest(id){if(activeQuests.length>=3){log("Max 3 küldetés.","sys","⚠️");return}activeQuests.push(id);log("Küldetés felvéve.","sys","📜");tavern(false)}
function getQuestProgress(q){
  if(q.type==="kill")return player.kills[q.target]||0;
  if(q.type==="find")return player.found[q.target]||0;
  if(q.type==="depth")return player.maxForestDepth||0;
  return 0;
}
function turnInQuest(id){
  let q=quests.find(x=>x.id===id),p=getQuestProgress(q);
  if(p<q.need){log("Még nincs kész.","sys","⚠️");return}
  player.xp+=q.reward.xp;player.silver+=q.reward.silver;addItem(q.reward.item);
  activeQuests=activeQuests.filter(x=>x!==id);completedQuestIds.push(id);
  log("Küldetés leadva: "+q.title,"gold","✅");levelCheck();renderLeft();tavern(false);
}

  currentScreen="dungeon";
  let keys=player.inv.filter(x=>x.name==="Rozsdás kulcs").length;
  if(!keys){setMain(`<div style="padding:16px"><h2 style="font-family:'Cinzel',serif;color:var(--gold);margin-bottom:10px">🕳️ Dungeon</h2><p style="color:var(--text3);line-height:1.7">Kell <b style="color:var(--gold)">Rozsdás kulcs</b>. Rejtekhelyekből vagy alkimistától szerezhetsz.</p></div>`,"Dungeon","🕳️");if(redraw)render();return}
  setMain(`<div style="padding:16px">
    <h2 style="font-family:'Cinzel',serif;color:var(--gold);margin-bottom:8px">🕳️ Elfeledett kripta</h2>
    <p style="color:var(--text3);margin-bottom:12px">Kulcsaid: <b class="gold">${keys}</b></p>
    <button class="btn-action" onclick="enterDungeon()">🚪 Belépek</button>
  </div>`,"Dungeon","🕳️");
  if(redraw)render();
}
function enterDungeon(){
  let i=player.inv.findIndex(x=>x.name==="Rozsdás kulcs");if(i<0){log("Nincs kulcs.","sys","⚠️");return}
  player.inv.splice(i,1);
  enemy=JSON.parse(JSON.stringify(dungeonBosses[r(0,dungeonBosses.length-1)]));
  currentScreen="battle";battleMsg="A dungeon ura rád támadt!";renderBattle();log("Beléptél a dungeonbe.","kill","💀");
}

// ===== SHOP =====
function shop(redraw=true){
  currentScreen="shop";
  let h=`<div style="padding:10px"><div class="srow" style="margin-bottom:8px"><span>Ezüstöd:</span><span class="gold" style="font-family:'Cinzel',serif;font-size:16px;font-weight:700">${player.silver} 🪙</span></div>`;
  shopItems.forEach((it,i)=>{
    h+=`<div class="equipbox"><b>${it.icon} ${it.name}</b><br><span class="eb-desc">${it.desc||""}</span><br><span class="eb-price">${it.price} ezüst</span> &nbsp;<button onclick="buy(${i})">🛒 Megveszem</button></div>`;
  });
  setMain(h+"</div>","Bolt","🛒");if(redraw)render();
}

// ===== BATTLE =====
function skillButtons(){
  if(!player.class)return"";
  const s={
    warrior:[["slash","🗡️","Hasítás"],["shield","🛡️","Pajzsütés"],["rage","🔥","Dühroham"],["execute","☠️","Kivégzés"]],
    mage:[["fire","🔥","Tűzgolyó"],["ice","❄️","Jégszilánk"],["heal","✨","Gyógyítás"],["storm","⚡","Villám"]],
    archer:[["shot","🎯","Pontos lövés"],["multi","🏹","Sortűz"],["trap","🪤","Csapda"],["eagle","🦅","Saslövés"]],
    ninja:[["backstab","🗡️","Hátbaszúrás"],["smoke","💨","Füstbomba"],["shuriken","⭐","Shuriken"],["shadow","🌑","Árnycsapás"]]
  };
  return(s[player.class]||[]).map(([k,ico,n])=>`<button class="btn-skill" onclick="useSkill('${k}')">${ico} ${n}</button>`).join("");
}

function renderBattle(){
  if(!enemy)return;
  let heroEmoji=portraitEmoji();
  let enemyContent=enemy.img
    ?`<img src="${enemy.img}" alt="${enemy.name}" style="max-height:160px;max-width:100%;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.9))">`
    :`<span style="font-size:90px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.9))">${enemy.icon||"?"}</span>`;

  document.getElementById("main").innerHTML=`
    <div class="battle-wrapper" style="padding:10px">
      <div class="battle-header">
        <div class="battle-title"><span class="bt-swords">⚔️</span> Harc <span class="bt-swords">⚔️</span></div>
        <div class="enemy-name-big">${enemy.name}</div>
        <div class="enemy-level">Szint: ${enemy.level}</div>
      </div>
      <div class="fight-scene" id="fight-scene">
        <div class="fighter-side" style="justify-content:flex-end;padding-bottom:10px">
          <div>
            <div class="combat-card">
              <b>Vándor</b>
              ${bar("❤️",player.hp,player.maxHp,"hp")}
              ${bar("⚡",player.en,player.maxEn,"en")}
            </div>
            <div style="text-align:center;margin-top:6px">
              <span class="fighter-sprite hero">${heroEmoji}</span>
            </div>
          </div>
        </div>
        <div class="fighter-side" style="justify-content:flex-end;padding-bottom:10px">
          <div style="width:100%">
            <div class="combat-card enemy-card">
              <b>${enemy.name}</b>
              ${bar("❤️",enemy.hp,enemy.maxHp,"hp")}
            </div>
            <div style="text-align:center;margin-top:6px" id="enemy-sprite-wrap">
              ${enemyContent}
            </div>
          </div>
        </div>
      </div>
      <div class="battle-actions">
        <button class="btn-action" onclick="attack()">⚔️ Támadás</button>
        <button class="btn-action" onclick="power()">✴️ Erős ütés</button>
        <button class="btn-action" onclick="potion()">🧪 Gyógyital</button>
        <button class="btn-action btn-danger" onclick="run()">🏃 Menekülés</button>
      </div>
      <div class="skills-row">${skillButtons()}</div>
      <div class="battle-text"><span class="bt-icon">⚔️</span><span>${battleMsg}</span></div>
    </div>`;
  document.getElementById("main-header").innerHTML=`<span class="ph-icon">⚔️</span>Harc`;
}

function showDamage(text,type,side){
  let scene=document.getElementById("fight-scene");if(!scene)return;
  let d=document.createElement("div");
  let cls="dmg-pop "+(side==="hero"?"hero-dmg":"enemy-dmg")+(type==="crit"?" crit":"")+(type==="heal"?" heal-pop":"");
  d.className=cls;
  if(type==="crit")d.innerHTML=text+`<span class="crit-text">KRIT!</span>`;
  else d.textContent=text;
  scene.appendChild(d);setTimeout(()=>d.remove(),900);
}
function enemyShake(){
  let w=document.getElementById("enemy-sprite-wrap");if(!w)return;
  w.classList.remove("shake");void w.offsetWidth;w.classList.add("shake");
  setTimeout(()=>w.classList.remove("shake"),280);
}

function useSkill(s){
  if(!enemy||!useClick(2))return;
  if(player.en<12){log("Nincs elég energia.","sys","⚠️");return}
  player.en-=12;
  let dmg=0,skip=false;
  if(s==="slash")dmg=atkTotal()+player.stats.str*4+r(8,18);
  if(s==="shield"){dmg=atkTotal()+defTotal()+r(5,12);skip=true}
  if(s==="rage")dmg=Math.floor((atkTotal()+player.stats.str*5+r(10,25))*1.4);
  if(s==="execute")dmg=enemy.hp<enemy.maxHp*.35?enemy.hp+5:atkTotal()+r(8,15);
  if(s==="fire")dmg=atkTotal()+player.stats.int*6+bonus("int")*6+r(12,24);
  if(s==="ice"){dmg=atkTotal()+player.stats.int*4+bonus("int")*4+r(8,18);skip=true}
  if(s==="heal"){let h=40+player.stats.int*5+bonus("int")*5;player.hp=Math.min(player.maxHp,player.hp+h);battleMsg=`✨ Gyógyítottál <span class='green'>+${h}</span> életet.`;log("Gyógyítottál +"+h,"loot","✨");showDamage("+"+h,"heal","hero");renderLeft();renderBattle();renderInv();return}
  if(s==="storm")dmg=Math.floor((atkTotal()+player.stats.int*7+bonus("int")*7+r(15,30))*1.5);
  if(s==="shot")dmg=atkTotal()+player.stats.dex*5+bonus("dex")*5+r(10,20);
  if(s==="multi")dmg=atkTotal()+player.stats.dex*3+bonus("dex")*3+r(15,35);
  if(s==="trap"){dmg=atkTotal()+player.stats.dex*3+r(8,16);skip=true}
  if(s==="eagle")dmg=Math.floor((atkTotal()+player.stats.dex*7+bonus("dex")*7+r(12,28))*1.4);
  if(s==="backstab")dmg=Math.floor((atkTotal()+player.stats.dex*5+bonus("dex")*5+r(12,22))*1.5);
  if(s==="smoke"){dmg=atkTotal()+r(5,12);skip=true}
  if(s==="shuriken")dmg=atkTotal()+player.stats.dex*4+bonus("dex")*4+r(10,24);
  if(s==="shadow")dmg=Math.floor((atkTotal()+player.stats.dex*7+bonus("dex")*7+player.stats.luck*2+bonus("luck")*2+r(15,30))*1.45);
  const skillNames={slash:"Hasítással súlyos sebet ejtettél",shield:"Pajzsütéssel megtorpantottad",rage:"Dührohammal rávetetted magad",execute:"Kivégzési csapást mértél",fire:"Tűzgolyó csapott le",ice:"Jégszilánkok hasítottak",storm:"Villám csapott le",shot:"Pontos lövéssel eltaláltad",multi:"Sortűzzel elárasztottad",trap:"Csapdába csalta az ellenfelet",eagle:"Saslövéssel megtorpantottad",backstab:"Hátbaszúrással meglepetted",smoke:"Füstbombával elvakítottad",shuriken:"Shuriken repült",shadow:"Árnycsapás sújtott le"};
  enemy.hp-=dmg;
  battleMsg=`${skillNames[s]||"Képesség"} <span class='green'>(${dmg} sebzés)</span>`;
  log((skillNames[s]||"Képesség")+": "+dmg,"hit","⚔️");
  showDamage("-"+dmg,dmg>atkTotal()*1.3?"crit":"","enemy");enemyShake();
  if(enemy.hp<=0){win();return}
  if(!skip)enemyTurn();else log("Az ellenfél elvesztette körét.","sys","·");
  renderLeft();renderBattle();renderInv();
}

function attack(){
  if(!enemy||!useClick(1))return;
  if(Math.random()<.08){battleMsg=`<span class="blue">⚡ Elhibáztad!</span>`;enemyTurn();renderLeft();renderBattle();renderInv();return}
  let dmg=atkTotal()+r(1,8);
  let isCrit=Math.random()<critTotal()/100;
  if(isCrit)dmg=Math.floor(dmg*1.8);
  enemy.hp-=dmg;
  battleMsg=`Megütötted${isCrit?' <span style="color:#ffd700">💥 KRITIKUS!</span>':""}: <span class="green">-${dmg}</span>`;
  log("Megütötted: "+(isCrit?"KRIT! ":"")+dmg,(isCrit?"gold":"hit"),(isCrit?"💥":"⚔️"));
  showDamage("-"+dmg,isCrit?"crit":"","enemy");enemyShake();
  if(enemy.hp<=0){win();return}
  enemyTurn();renderLeft();renderBattle();renderInv();
}

function power(){
  if(!enemy)return;
  if(player.en<12){log("Nincs elég energia.","sys","⚠️");return}
  if(!useClick(2))return;
  player.en-=12;
  let dmg=Math.floor((atkTotal()+r(8,18))*1.5);
  enemy.hp-=dmg;
  battleMsg=`Erős ütés: <span class="green">-${dmg}</span>`;
  log("Erős ütés: "+dmg,"hit","✴️");
  showDamage("-"+dmg,"crit","enemy");enemyShake();
  if(enemy.hp<=0){win();return}
  enemyTurn();renderLeft();renderBattle();renderInv();
}

function enemyTurn(){
  if(!enemy)return;
  if(Math.random()<dodgeTotal()/100){battleMsg+=`<br><span class="blue">💨 Kitértél!</span>`;log("Kitértél a csapás elől.","hit","💨");return}
  let dmg=Math.max(1,enemy.atk+r(1,6)-defTotal());
  player.hp-=dmg;
  showDamage("-"+dmg,"","hero");
  battleMsg+=`<br><span class="red">${enemy.name} visszaütött: -${dmg}</span>`;
  log(enemy.name+" visszaütött "+dmg,"dmg","🩸");
  if(player.hp<=0){
    player.hp=Math.floor(player.maxHp/2);player.silver=Math.floor(player.silver*.8);
    enemy=null;currentScreen="town";log("⚰️ Elájultál! Elvesztettél ezüstöt.","kill","💀");
  }
}

function potion(){
  let i=player.inv.findIndex(x=>x.type==="potion");
  if(i<0){log("Nincs gyógyitalod.","sys","⚠️");return}
  let h=35;if(player.inv[i].name==="Nagy gyógyital")h=75;if(player.inv[i].name==="Erdei gomba")h=15;
  player.inv.splice(i,1);player.hp=Math.min(player.maxHp,player.hp+h);
  battleMsg=`🧪 Gyógyitalt ittál: <span class="green">+${h}</span>`;
  log("Gyógyital: +"+h,"loot","🧪");
  showDamage("+"+h,"heal","hero");renderLeft();renderBattle();renderInv();
}

function win(){
  log("Legyőzted: "+enemy.name,"kill","💀");
  player.kills[enemy.name]=(player.kills[enemy.name]||0)+1;
  if(enemy.boss)player.bossKills++;
  if(enemy.arena)player.arenaWins++;
  player.silver+=enemy.silver;player.xp+=enemy.xp;
  log("Jutalom: "+enemy.silver+" ezüst, "+enemy.xp+" XP.","gold","🪙");
  if(enemy.boss){let item=rareLoot[r(0,rareLoot.length-1)];addItem(item);log("Dungeon zsákmány: "+item.name,"gold","⭐")}
  else if(Math.random()<.55){
    let pool=[...forestLoot];if(Math.random()<.15)pool=[...pool,...rareLoot];
    let loot=pool[r(0,pool.length-1)];addItem(loot);log("Találtál: "+loot.name,"loot","✦");
  }
  enemy=null;levelCheck();currentScreen="town";render();
}

function levelCheck(){
  while(player.xp>=needXp()){
    player.xp-=needXp();player.level++;player.statPoints+=5;
    player.maxHp+=25;player.maxEn+=10;player.atk+=3;player.def+=1;
    player.hp=player.maxHp;player.en=player.maxEn;
    log("Szintet léptél! Szint: "+player.level+" — +5 képességpont.","gold","⭐");
  }
}

// ===== INVENTORY =====
function useInv(i){
  let it=player.inv[i];if(!it)return;
  if(it.type==="potion"){
    let h=35;if(it.name==="Nagy gyógyital")h=75;if(it.name==="Erdei gomba")h=15;
    player.inv.splice(i,1);player.hp=Math.min(player.maxHp,player.hp+h);
    log("Használtad: "+it.name+" +"+h,"loot","🧪");
  }else if(["weapon","armor","ring","amulet"].includes(it.type)){
    if(it.classReq!=="all"&&player.class!==it.classReq){
      let price=r(80,180);player.silver+=price;player.inv.splice(i,1);
      log("Nem a kasztodnak való, eladtad: "+it.name+" +"+price,"gold","🪙");renderLeft();renderInv();return;
    }
    let old=player[it.type];player[it.type]=it;player.inv.splice(i,1);
    if(old&&old.name&&!old.name.startsWith("Nincs")&&old.name!=="Bot"&&old.name!=="Rongyos ruha")player.inv.push(old);
    log("Felszerelted: "+it.name,"loot","⚔️");
  }else if(it.type==="key"){log("Ez kulcs. Dungeonben használható.","sys","🗝️")}
  else{
    let price=r(15,60);if(it.desc==="Ritka")price=r(60,140);
    player.silver+=price;player.inv.splice(i,1);
    log("Eladtad: "+it.name+" +"+price,"gold","🪙");
  }
  renderLeft();renderInv();
  if(currentScreen==="battle")renderBattle();
}
function buy(i){
  let it=shopItems[i];if(player.silver<it.price){log("Nincs elég ezüst.","sys","⚠️");return}
  if(it.type==="bag"){if(it.bagCap<=player.bagCap){log("Már nagyobb táskád van.","sys","⚠️");return}player.silver-=it.price;player.bagCap=it.bagCap;log("Nagyobb táska!","gold","🎒");renderLeft();renderInv();shop(false);return}
  player.silver-=it.price;
  addItem(it.type==="weapon"||it.type==="armor"?{...it}:{name:it.name,type:it.type,icon:it.icon,desc:it.desc});
  log("Megvetted: "+it.name,"gold","🛒");renderLeft();renderInv();shop(false);
}

// ===== MISC =====
function run(){enemy=null;currentScreen="forest";log("Elmenekültél.","sys","🏃");forest(false);renderLeft();renderInv()}
function work(){if(!useClick(5))return;let m=r(40,90);player.silver+=m;player.en=Math.max(0,player.en-8);log("Dolgoztál: +"+m+" ezüst","gold","⚒️");renderLeft();renderInv()}
function daily(){player.clicks=80+player.level*10;player.en=player.maxEn;log("☀️ Új nap kezdődött!","gold","☀️");renderLeft()}
function rest(){if(player.silver<20){log("Nincs elég ezüst.","sys","⚠️");return}player.silver-=20;player.hp=player.maxHp;player.en=player.maxEn;log("Megpihentél. (20 ezüst)","sys","🛏️");renderLeft()}
function leaveForest(){forestDepth=0;initMinimap();town()}
function startBattleFromForest(){
  enemy=JSON.parse(JSON.stringify(enemies[r(0,enemies.length-1)]));
  currentScreen="battle";battleMsg="Az erdőből rád rontott valami!";renderBattle();
  log("Rád támadt: "+enemy.name,"kill","💀");renderLeft();renderInv();
}

// ===== SAVE / LOAD =====
function save(){
  localStorage.setItem("arkanorSave",JSON.stringify(player));
  localStorage.setItem("arkanorDepth",forestDepth);
  localStorage.setItem("arkanorQuests",JSON.stringify(activeQuests));
  localStorage.setItem("arkanorDoneQuests",JSON.stringify(completedQuestIds));
  log("Játék elmentve.","sys","💾");
}
function load(){
  let s=localStorage.getItem("arkanorSave");if(!s){log("Nincs mentés.","sys","⚠️");return}
  player=JSON.parse(s);normalize();
  forestDepth=parseInt(localStorage.getItem("arkanorDepth")||"0");
  activeQuests=JSON.parse(localStorage.getItem("arkanorQuests")||"[]");
  completedQuestIds=JSON.parse(localStorage.getItem("arkanorDoneQuests")||"[]");
  currentScreen="town";render();log("Mentés betöltve.","gold","📜");
}

// ===== START =====
normalize();render();
log("Beléptél Arkanor világába. Jó kalandozást!","gold","⚔️");
</script>
</body>
</html>
